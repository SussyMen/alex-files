<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstagram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* СБРОС И ТЕМА */
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #dbdbdb;
            --accent: #0095f6;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --border: #262626;
                --accent: #ffffff;
                --btn-text: #000000;
            }
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }

        header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid var(--border); 
            background: var(--bg); position: sticky; top: 0; z-index: 9999;
        }

        .logo { font-size: 20px; font-weight: bold; }
        
        .btn-auth { 
            background: var(--text); color: var(--bg); border: none; 
            padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer;
            z-index: 10000; position: relative; /* Чтобы кнопка всегда была сверху */
        }

        .gallery { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; 
            max-width: 935px; margin: 0 auto; padding-top: 2px;
        }

        .photo-card { aspect-ratio: 1/1; background: var(--border); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 20000; 
            display: none; align-items: center; justify-content: center; 
        }

        .auth-card { 
            background: var(--bg); padding: 30px; border-radius: 15px; 
            width: 85%; max-width: 300px; text-align: center; color: var(--text);
        }

        .auth-card input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid var(--border); border-radius: 8px; 
            background: var(--bg); color: var(--text); box-sizing: border-box;
        }

        .btn-submit { 
            width: 100%; padding: 12px; background: var(--accent); 
            color: var(--btn-text); border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .switch-text { color: var(--accent); cursor: pointer; margin-top: 15px; display: block; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Alexstagram</div>
        <div id="nav-right">
            <button class="btn-auth" id="mainAuthBtn" onclick="toggleAuth()">Войти</button>
            <div id="userUI" style="display:none; gap: 15px; align-items: center;">
                <button onclick="triggerUpload()" style="background:none; border:none; font-size:24px; color:var(--text);">➕</button>
                <div onclick="handleLogout()" style="cursor:pointer; font-size:20px;">👤</div>
            </div>
        </div>
    </header>

    <div id="authModal" class="modal-overlay">
        <div class="auth-card">
            <h2 id="modalTitle">Вход</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-submit" onclick="runAuth()">Продолжить</button>
            <span class="switch-text" id="switchBtn" onclick="swapMode()">Нет аккаунта? Регистрация</span>
            <button onclick="toggleAuth()" style="background:none; border:none; color:gray; margin-top:20px;">Отмена</button>
        </div>
    </div>

    <input type="file" id="fileInp" style="display:none" onchange="doUpload()">

    <main><div class="gallery" id="grid"></div></main>

    <script>
        const URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
        const KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';
        const sb = window.supabase.createClient(URL, KEY);

        let isReg = false;

        // ФУНКЦИЯ ОТКРЫТИЯ (Теперь точно сработает)
        function toggleAuth() {
            const m = document.getElementById('authModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function swapMode() {
            isReg = !isReg;
            document.getElementById('modalTitle').innerText = isReg ? "Регистрация" : "Вход";
            document.getElementById('switchBtn').innerText = isReg ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
        }

        async function runAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return alert("Заполни поля");

            const { data, error } = isReg 
                ? await sb.auth.signUp({ email: e, password: p })
                : await sb.auth.signInWithPassword({ email: e, password: p });

            if(error) alert(error.message);
            else {
                alert(isReg ? "Готово! Теперь войдите." : "Вы вошли!");
                location.reload();
            }
        }

        async function handleLogout() {
            if(confirm("Выйти?")) { await sb.auth.signOut(); location.reload(); }
        }

        async function load() {
            const { data, error } = await sb.storage.from('photos').list();
            if(error) return;
            const g = document.getElementById('grid');
            g.innerHTML = "";
            data.forEach(f => {
                const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(f.name);
                g.innerHTML += `<div class="photo-card"><img src="${publicUrl}"></div>`;
            });
        }

        function triggerUpload() { document.getElementById('fileInp').click(); }
        async function doUpload() {
            const f = document.getElementById('fileInp').files[0];
            if(!f) return;
            const n = Date.now() + f.name;
            await sb.storage.from('photos').upload(n, f);
            load();
        }

        async function check() {
            const { data: { session } } = await sb.auth.getSession();
            if(session) {
                document.getElementById('mainAuthBtn').style.display = 'none';
                document.getElementById('userUI').style.display = 'flex';
            }
            load();
        }
        check();
    </script>
</body>
</html>
