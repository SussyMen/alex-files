<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Файлы Алексея</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Файлы Алексея</h1>
        <div class="admin-controls">
            <button id="loginBtn" onclick="toggleAdminPanel()">Админ-панель</button>
            <span id="adminStatus" style="display:none;">🔓 Режим администратора</span>
        </div>
    </header>

    <div id="passwordPanel" class="hidden">
        <input type="password" id="adminPass" placeholder="Введите пароль">
        <button onclick="checkPassword()">Войти</button>
    </div>

    <main>
        <section class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <button onclick="uploadPhoto()">Загрузить фото</button>
        </section>

        <div class="gallery" id="gallery"></div>
    </main>

    <div id="fullScreenModal" class="modal" onclick="closeFullScreen()">
        <img id="fullScreenImg" src="">
    </div>

    <script src="script.js"></script>
</body>
</html>
