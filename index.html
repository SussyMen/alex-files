<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstagram | Project</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --border: #dbdbdb;
            --accent: #0095f6;
            --danger: #ed4956;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --text: #ffffff;
                --border: #262626;
            }
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        header {
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 1px solid var(--border);
            background: var(--bg); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: bold; cursor: default; }
        .btn-main { background: var(--text); color: var(--bg); border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .gallery {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
            max-width: 935px; margin: 0 auto;
        }

        .photo-card { position: relative; aspect-ratio: 1/1; background: var(--border); overflow: hidden; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .del-btn {
            position: absolute; top: 5px; right: 5px; background: var(--danger);
            color: white; border: none; border-radius: 4px; padding: 5px 8px;
            font-size: 12px; cursor: pointer; font-weight: bold; z-index: 10;
        }

        /* Modal */
        #authModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: none; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--bg); padding: 30px; border-radius: 15px;
            width: 85%; max-width: 320px; text-align: center;
        }
        .auth-card input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--bg); color: var(--text); box-sizing: border-box;
        }
        .btn-blue { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-link { background: none; border: none; color: var(--accent); margin-top: 15px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Alexstagram</div>
        <div id="nav">
            <button class="btn-main" id="loginBtn" onclick="openAuth()">Войти</button>
            <div id="userMenu" style="display:none; gap:15px; align-items:center;">
                <button onclick="triggerFile()" style="background:none; border:none; font-size:24px; color:var(--text); cursor:pointer;">➕</button>
                <div onclick="logout()" style="cursor:pointer; font-size:22px;">👤</div>
            </div>
        </div>
    </header>

    <div id="authModal">
        <div class="auth-card">
            <h2 id="authTitle">Вход</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="btn-blue" id="submitBtn" onclick="handleAuth()">Продолжить</button>
            <button class="btn-link" id="switchBtn" onclick="toggleMode()">Нет аккаунта? Регистрация</button>
            <br>
            <button onclick="closeAuth()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <input type="file" id="fileInp" style="display:none" onchange="upload()">

    <main>
        <div class="gallery" id="grid"></div>
    </main>

    <script>
        // ВПИШИ СВОЙ EMAIL ТУТ ДЛЯ ФУНКЦИЙ АДМИНА
        const ADMIN_EMAIL = 'ivan.amogus737@gmail.com';

        const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
        const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let isSignUp = false;

        function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').innerText = isSignUp ? "Регистрация" : "Вход";
            document.getElementById('switchBtn').innerText = isSignUp ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            if(!email || !pass) return alert("Заполни поля");

            const { data, error } = isSignUp
                ? await supabase.auth.signUp({ email, password: pass })
                : await supabase.auth.signInWithPassword({ email, password: pass });

            if(error) alert(error.message);
            else {
                alert(isSignUp ? "Регистрация прошла! Теперь войдите." : "Успешный вход!");
                if(!isSignUp) location.reload();
                else toggleMode();
            }
        }

        async function logout() {
            if(confirm("Выйти?")) { await supabase.auth.signOut(); location.reload(); }
        }

        async function loadPhotos() {
            const { data: sessionData } = await supabase.auth.getSession();
            const currentUser = sessionData?.session?.user;

            const { data, error } = await supabase.storage.from('photos').list('', {
                sortBy: { column: 'name', order: 'desc' }
            });
            if(error) return;

            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            data.forEach(file => {
                const { data: { publicUrl } } = supabase.storage.from('photos').getPublicUrl(file.name);

                // Проверка на админа для кнопки удаления
                const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;
                const delBtn = isAdmin ? `<button class="del-btn" onclick="deletePhoto('${file.name}')">Удалить</button>` : "";

                grid.innerHTML += `
                    <div class="photo-card">
                        ${delBtn}
                        <img src="${publicUrl}" onerror="this.parentElement.style.display='none'">
                    </div>`;
            });
        }

        function triggerFile() { document.getElementById('fileInp').click(); }

        async function upload() {
            const file = document.getElementById('fileInp').files[0];
            if(!file) return;

            // Исправление ошибки 400: чистим имя файла
            const cleanName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
            const fileName = `${Date.now()}_${cleanName}`;

            const { error } = await supabase.storage.from('photos').upload(fileName, file);

            if(error) {
                alert("Ошибка: " + error.message);
            } else {
                loadPhotos();
            }
        }

        async function deletePhoto(name) {
            if(confirm("Удалить это фото навсегда?")) {
                const { error } = await supabase.storage.from('photos').remove([name]);
                if(error) alert(error.message);
                else loadPhotos();
            }
        }

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if(session) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userMenu').style.display = 'flex';
            }
            loadPhotos();
        }

        init();
    </script>
</body>
</html>
