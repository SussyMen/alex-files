<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstagram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff; --text: #000; --border: #efefef; --accent: #0095f6; --danger: #ed4956; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; --border: #262626; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; max-width: 935px; margin: 0 auto; padding: 3px; }
        .photo-card { position: relative; aspect-ratio: 1/1; background: var(--border); cursor: pointer; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAL VIEW */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px 0; }
        .view-content { background: var(--bg); width: 95%; max-width: 500px; border-radius: 12px; overflow: hidden; }
        .view-img { width: 100%; display: block; }
        .view-info { padding: 15px; }
        .actions { display: flex; gap: 15px; margin-bottom: 10px; font-size: 24px; }
        .comments-section { border-top: 1px solid var(--border); padding-top: 10px; max-height: 200px; overflow-y: auto; font-size: 14px; }
        .comment-item { margin-bottom: 5px; }
        .comment-input-area { display: flex; margin-top: 10px; gap: 5px; }
        .comment-input-area input { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 5px; background: var(--bg); color: var(--text); }

        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo">Alexstagram</div>
    <div id="nav">
        <button id="loginBtn" onclick="document.getElementById('authModal').style.display='flex'" style="background:var(--text); color:var(--bg); border:none; padding:8px 16px; border-radius:8px; font-weight:bold;">Войти</button>
        <div id="userMenu" style="display:none; gap:12px; align-items:center;">
            <button onclick="document.getElementById('fileInp').click()" style="background:none; border:none; color:var(--text); font-size:28px; cursor:pointer;">➕</button>
            <button onclick="logout()" style="background:none; border:none; color:var(--text); font-size:22px; cursor:pointer;">👤</button>
        </div>
    </div>
</header>

<div class="modal" id="viewModal">
    <div class="view-content">
        <img class="view-img" id="fullImg">
        <div class="view-info">
            <div class="actions">
                <span id="likeBtn" onclick="handleLike()" style="cursor:pointer;">🤍</span>
                <span id="likeCount" style="font-size:18px; font-weight:bold;">0</span>
            </div>
            <div class="comments-section" id="commentsList"></div>
            <div class="comment-input-area">
                <input type="text" id="commInp" placeholder="Добавить комментарий...">
                <button onclick="addComment()" style="background:none; border:none; color:var(--accent); font-weight:bold;">Ок</button>
            </div>
        </div>
    </div>
    <button onclick="closeView()" style="color:white; background:none; border:none; margin-top:20px; font-size:18px; cursor:pointer;">Закрыть</button>
</div>

<div class="modal" id="authModal" style="justify-content:center; display:none;">
    <div style="background:var(--bg); padding:30px; border-radius:15px; width:280px; text-align:center;">
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="auth('login')" style="width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:5px;">Войти</button>
        <button onclick="auth('up')" style="width:100%; padding:10px; background:none; border:none; color:gray; margin-top:10px;">Регистрация</button>
    </div>
</div>

<input type="file" id="fileInp" style="display:none" onchange="upload()">
<main><div class="gallery" id="grid"></div></main>

<script>
    const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
    const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let currentUser = null;
    let currentPost = null;

    // Инициализация
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        currentUser = session?.user;
        if(currentUser) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
        }
        loadPosts();
    }

    async function auth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const { error } = type === 'up' ? await sb.auth.signUp({email:e, password:p}) : await sb.auth.signInWithPassword({email:e, password:p});
        if(error) alert(error.message); else location.reload();
    }

    async function logout() { await sb.auth.signOut(); location.reload(); }

    async function loadPosts() {
        const { data, error } = await sb.from('posts').select('*').order('created_at', {ascending: false});
        if(error) return;
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        data.forEach(post => {
            grid.innerHTML += `<div class="photo-card" onclick="viewPost('${post.id}')"><img src="${post.image_url}"></div>`;
        });
    }

    async function upload() {
        const file = document.getElementById('fileInp').files[0];
        if(!file || !currentUser) return;
        const path = `${Date.now()}_${file.name}`;
        const { data: upData, error: upErr } = await sb.storage.from('photos').upload(path, file);
        if(upErr) return alert(upErr.message);

        const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(path);
        await sb.from('posts').insert({ image_url: publicUrl, storage_path: path });
        loadPosts();
    }

    async function viewPost(id) {
        const { data } = await sb.from('posts').select('*').eq('id', id).single();
        currentPost = data;
        document.getElementById('fullImg').src = data.image_url;
        document.getElementById('likeCount').innerText = data.likes.length;
        document.getElementById('likeBtn').innerText = data.likes.includes(currentUser?.id) ? "❤️" : "🤍";

        const list = document.getElementById('commentsList');
        list.innerHTML = data.comments.map(c => `<div class="comment-item"><b>${c.user}:</b> ${c.text}</div>`).join('');

        document.getElementById('viewModal').style.display = 'flex';
    }

    async function handleLike() {
        if(!currentUser) return alert("Войдите, чтобы лайкать");
        let newLikes = [...currentPost.likes];
        if(newLikes.includes(currentUser.id)) newLikes = newLikes.filter(id => id !== currentUser.id);
        else newLikes.push(currentUser.id);

        await sb.from('posts').update({ likes: newLikes }).eq('id', currentPost.id);
        viewPost(currentPost.id);
    }

    async function addComment() {
        const text = document.getElementById('commInp').value;
        if(!text || !currentUser) return alert("Войдите и напишите текст");
        const newComments = [...currentPost.comments, { user: currentUser.email.split('@')[0], text }];

        await sb.from('posts').update({ comments: newComments }).eq('id', currentPost.id);
        document.getElementById('commInp').value = "";
        viewPost(currentPost.id);
    }

    function closeView() { document.getElementById('viewModal').style.display = 'none'; }

    init();
</script>
</body>
</html>
