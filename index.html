<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexstagram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="logo">Alex<span>stagram</span></div>
        <div class="nav-icons">
            <button class="icon-btn" id="addBtn" onclick="window.triggerUpload()" style="display:none;">➕</button>
            <button class="icon-btn" id="authBtn" onclick="window.toggleAuthModal()">Войти</button>
            <div id="userProfile" class="user-avatar" style="display:none;" onclick="window.handleLogout()">👤</div>
        </div>
    </header>

    <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="window.uploadPhoto()">

    <div id="authModal" class="modal-auth hidden">
        <div class="auth-content">
            <h2 id="authTitle">Вход</h2>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPass" placeholder="Пароль">
            <button class="primary-btn" onclick="window.handleAuth()">Продолжить</button>
            <p class="auth-switch" onclick="window.switchAuthMode()" id="authSwitch">Нет аккаунта? Регистрация</p>
            <button onclick="window.toggleAuthModal()" style="background:none; border:none; margin-top:15px; color:gray; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <main>
        <div class="gallery" id="gallery"></div>
    </main>

    <div id="fullScreenModal" class="modal hidden">
        <div class="modal-header">
            <button class="close-icon" onclick="window.closeFullScreen()">✕</button>
            <span class="modal-title">Публикация</span>
        </div>
        <div class="modal-content-wrapper">
            <div class="image-container">
                <button class="nav-btn left" onclick="window.prevPhoto()">‹</button>
                <img id="fullScreenImg" src="">
                <button class="nav-btn right" onclick="window.nextPhoto()">›</button>
            </div>
            <div class="interaction-area">
                <div class="actions">
                    <button class="like-btn" onclick="window.likeCurrentPhoto()">❤️</button>
                </div>
                <span class="likes-count">Нравится: <span id="likeCount">0</span></span>
                <div id="commentsList"></div>
                <div class="comment-input-area" id="commentArea">
                    <input type="text" id="commentInput" placeholder="Добавьте комментарий...">
                    <button onclick="window.addComment()">Опубликовать</button>
                </div>
                <p id="authNotice" class="hidden" style="color:gray; font-size:12px;">Войдите, чтобы ставить лайки и писать комментарии</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
