<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив | Alex Files</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="background-blobs"></div>

    <header>
        <div class="logo">Alex<span>Files</span></div>
        <div class="admin-controls">
            <button class="icon-btn" onclick="window.toggleAdminPanel()">⚙️</button>
            <span id="adminStatus" class="status-badge" style="display:none;">Admin Mode</span>
        </div>
    </header>

    <div id="passwordPanel" class="modal-mini hidden">
        <div class="modal-content">
            <input type="password" id="adminPass" placeholder="Пароль администратора">
            <button onclick="window.checkPassword()">Войти</button>
        </div>
    </div>

    <main>
        <div class="upload-card">
            <label for="imageInput" class="custom-file-upload">Выберите изображение</label>
            <input type="file" id="imageInput" accept="image/*" onchange="window.updateFileName()">
            <span id="fileNameDisplay">Файл не выбран</span>
            <button id="uploadBtn" onclick="window.uploadPhoto()">Загрузить</button>
        </div>
        
        <div class="gallery" id="gallery"></div>
    </main>

    <div id="fullScreenModal" class="modal hidden">
        <button class="close-btn" onclick="window.closeFullScreen()">✖</button>
        
        <button class="nav-btn left" onclick="window.prevPhoto()">&#10094;</button>
        
        <div class="modal-content-wrapper">
            <img id="fullScreenImg" src="">
            
            <div class="interaction-bar">
                <button class="like-btn" onclick="window.likeCurrentPhoto()">
                    ❤️ <span id="likeCount">0</span>
                </button>
            </div>
            
            <div class="comments-section">
                <div id="commentsList"></div>
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="Написать комментарий...">
                    <button onclick="window.addComment()">Отправить</button>
                </div>
            </div>
        </div>

        <button class="nav-btn right" onclick="window.nextPhoto()">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
