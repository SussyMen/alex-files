<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexstagram Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #121212; --text: #fff; --accent: #0095f6; --gray: #262626; --danger: #ed4956; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 -20px; border-bottom: 1px solid var(--gray); position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; padding: 0 20px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; max-width: 935px; margin: 20px auto; }
        .photo-card { aspect-ratio: 1/1; background: var(--gray); cursor: pointer; overflow: hidden; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); width: 95%; max-width: 900px; display: flex; height: 80vh; border-radius: 8px; overflow: hidden; border: 1px solid var(--gray); }
        .modal-photo-side { flex: 1.5; background: #000; display: flex; align-items: center; justify-content: center; }
        .modal-photo-side img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .modal-info-side { flex: 1; display: flex; flex-direction: column; border-left: 1px solid var(--gray); padding: 15px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<header>
    <div onclick="location.reload()" style="cursor:pointer; font-size:22px; font-weight:900;">Alexstagram</div>
    <div id="nav-actions">
        <button id="loginBtn" class="btn" onclick="openM('authM')">Войти</button>
        <div id="userMenu" style="display:none; gap:15px; align-items:center;">
            <button style="background:none; border:none; color:#fff; font-size:26px; cursor:pointer;" onclick="document.getElementById('fileI').click()">➕</button>
            <img id="navAvatar" onclick="viewMyProfile()" src="" class="avatar" style="cursor:pointer; border:1px solid #555;">
        </div>
    </div>
</header>

<main id="main-grid" class="gallery"></main>

<div class="modal" id="viewM" onclick="if(event.target==this) closeM('viewM')">
    <div class="modal-content">
        <div class="modal-photo-side"><img id="fImg"></div>
        <div class="modal-info-side">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; font-weight:bold;">
                <img id="pAuthorAv" class="avatar">
                <span id="pAuthorName">User</span>
            </div>
            <div id="cL" style="flex:1; overflow-y:auto; font-size:14px; border-top:1px solid var(--gray); padding-top:10px;"></div>
            <div style="margin-top:10px;">
                <span id="lH" onclick="doLike()" style="font-size:24px; cursor:pointer;">🤍</span>
                <span id="lC" style="font-weight:bold">0</span>
            </div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <input type="text" id="cI" placeholder="Коммент..." style="flex:1; background:#000; border:1px solid var(--gray); color:#fff; padding:8px; border-radius:5px;">
                <button class="btn" onclick="doComm()">Ок</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="authM" onclick="if(event.target==this) closeM('authM')">
    <div style="background:var(--card); padding:30px; border-radius:15px; width:280px; text-align:center;">
        <h2 id="aT">Вход</h2>
        <input type="email" id="aE" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid var(--gray); background:#000; color:#fff;">
        <input type="password" id="aP" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--gray); background:#000; color:#fff;">
        <button class="btn" style="width:100%" onclick="auth()">Продолжить</button>
        <p onclick="isS=!isS; document.getElementById('aT').innerText=isS?'Регистрация':'Вход'" style="color:var(--accent); cursor:pointer; font-size:12px; margin-top:15px;">Сменить режим</p>
    </div>
</div>

<input type="file" id="fileI" style="display:none" onchange="upload()">

<script>
    const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
    const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let currU = null, currP = null, isS = false;

    // ГЛОБАЛЬНЫЕ ФУНКЦИИ (чтобы не было "is not defined")
    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        currU = session?.user;
        if(currU) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
            const { data: p } = await sb.from('profiles').select('*').eq('id', currU.id).single();
            document.getElementById('navAvatar').src = p?.avatar_url || 'https://via.placeholder.com/150';
        }
        loadPosts();
    }

    window.auth = async () => {
        const e = document.getElementById('aE').value, p = document.getElementById('aP').value;
        const { data, error } = isS ? await sb.auth.signUp({email:e, password:p}) : await sb.auth.signInWithPassword({email:e, password:p});
        if(error) alert(error.message);
        else {
            if(isS) await sb.from('profiles').insert({id: data.user.id, username: e.split('@')[0]});
            location.reload();
        }
    };

    async function loadPosts() {
        const { data, error } = await sb.from('posts').select('*, profiles(username, avatar_url)').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('main-grid').innerHTML = data.map(p =>
                `<div class="photo-card" onclick="viewP('${p.id}')"><img src="${p.image_url}"></div>`
            ).join('');
        }
    }

    window.viewP = async (id) => {
        const { data } = await sb.from('posts').select('*, profiles(*)').eq('id', id).single();
        if(!data) return;
        currP = data;
        document.getElementById('fImg').src = data.image_url;
        document.getElementById('lC').innerText = data.likes?.length || 0;
        document.getElementById('lH').innerText = data.likes?.includes(currU?.id) ? "❤️" : "🤍";
        document.getElementById('pAuthorName').innerText = data.profiles?.username || 'User';
        document.getElementById('pAuthorAv').src = data.profiles?.avatar_url || 'https://via.placeholder.com/150';
        document.getElementById('cL').innerHTML = (data.comments || []).map(c => `<div><b>${c.user}:</b> ${c.text}</div>`).join('');
        openM('viewM');
    };

    window.upload = async () => {
        const file = document.getElementById('fileI').files[0];
        if(!file || !currU) return;
        const name = `${Date.now()}_${file.name}`;
        const { error: upErr } = await sb.storage.from('photos').upload(name, file);
        if(upErr) return alert(upErr.message);

        const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(name);
        await sb.from('posts').insert({ image_url: publicUrl, author_id: currU.id });
        location.reload();
    };

    window.viewMyProfile = () => {
        alert("Профиль пользователя: " + (currU?.email || "Гость"));
    };

    window.doLike = async () => {
        if(!currU) return openM('authM');
        let likes = currP.likes || [];
        let newLikes = likes.includes(currU.id) ? likes.filter(i => i!==currU.id) : [...likes, currU.id];
        await sb.from('posts').update({ likes: newLikes }).eq('id', currP.id);
        viewP(currP.id);
    };

    window.doComm = async () => {
        const t = document.getElementById('cI').value;
        if(!t || !currU) return;
        const { data: p } = await sb.from('profiles').select('username').eq('id', currU.id).single();
        const nc = [...(currP.comments || []), { user: p.username, text: t }];
        await sb.from('posts').update({ comments: nc }).eq('id', currP.id);
        document.getElementById('cI').value = "";
        viewP(currP.id);
    };

    init();
</script>
</body>
</html>
