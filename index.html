<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexstagram Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #121212; --text: #fff; --accent: #0095f6; --gray: #262626; --danger: #ed4956; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--gray); position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }

        .profile-header { max-width: 935px; margin: 30px auto; display: flex; align-items: center; gap: 40px; padding: 20px; }
        .avatar-container { position: relative; width: 150px; height: 150px; cursor: pointer; }
        .avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gray); }
        .avatar-overlay { position: absolute; bottom: 5px; right: 5px; background: var(--accent); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; max-width: 935px; margin: 0 auto; }
        .photo-card { aspect-ratio: 1/1; background: var(--gray); cursor: pointer; position: relative; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; border: none; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); width: 95%; max-width: 800px; display: flex; height: 80vh; border-radius: 4px; overflow: hidden; }
        .modal-photo-side { flex: 1.5; background: #000; display: flex; align-items: center; justify-content: center; }
        .modal-photo-side img { max-width: 100%; max-height: 100%; object-fit: contain; } /* ИСПРАВЛЕНО ОТОБРАЖЕНИЕ */

        .modal-info-side { flex: 1; display: flex; flex-direction: column; border-left: 1px solid var(--gray); padding: 15px; }
        .user-row { display: flex; align-items: center; gap: 10px; font-weight: 700; margin-bottom: 15px; cursor: pointer; }
        .user-row img { width: 30px; height: 30px; border-radius: 50%; }

        .comments-box { flex: 1; overflow-y: auto; font-size: 14px; border-top: 1px solid var(--gray); padding-top: 10px; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="viewMainGallery()" style="cursor:pointer; font-size:22px; font-weight:900;">Alexstagram</div>
    <div id="nav-actions">
        <button id="loginBtn" class="btn" onclick="openM('authM')">Войти</button>
        <div id="userMenu" style="display:none; gap:15px; align-items:center;">
            <div id="loader" class="spinner"></div>
            <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="document.getElementById('fileI').click()">➕</button>
            <img id="navAvatar" onclick="viewMyProfile()" src="" style="width:30px; height:30px; border-radius:50%; cursor:pointer; border:1px solid #555;">
        </div>
    </div>
</header>

<div id="profile-section"></div>
<main id="main-content"><div class="gallery" id="grid"></div></main>

<div class="modal" id="viewM" onclick="if(event.target==this) closeM('viewM')">
    <div class="modal-content">
        <div class="modal-photo-side"><img id="fImg"></div>
        <div class="modal-info-side">
            <div class="user-row" id="postAuthor" onclick="viewUserProfile(currP.author_id)">
                <img id="postAuthorAv" src="">
                <span id="postAuthorName">User</span>
            </div>
            <div class="comments-box" id="cL"></div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="lH" onclick="doLike()" style="font-size:24px; cursor:pointer;">🤍</span>
                <span id="lC" style="font-weight:bold">0</span>
            </div>
            <div style="display:flex; margin-top:10px; gap:5px;">
                <input type="text" id="cI" placeholder="Комментировать..." style="flex:1; background:none; border:1px solid var(--gray); color:#fff; padding:8px; border-radius:5px;" onkeydown="if(event.key==='Enter') doComm()">
                <button class="btn" onclick="doComm()" style="padding:5px 10px;">Ок</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="authM" onclick="if(event.target==this) closeM('authM')">
    <div style="background:var(--card); padding:30px; border-radius:15px; width:300px; text-align:center;">
        <h2 id="aT">Вход</h2>
        <input type="email" id="aE" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid var(--gray); background:#000; color:#fff;">
        <input type="password" id="aP" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--gray); background:#000; color:#fff;">
        <button class="btn" style="width:100%" onclick="auth()">Продолжить</button>
        <p onclick="isS=!isS; document.getElementById('aT').innerText=isS?'Регистрация':'Вход'" style="color:var(--accent); cursor:pointer; font-size:12px; margin-top:15px;">Сменить режим</p>
    </div>
</div>

<input type="file" id="fileI" style="display:none" onchange="upload()">
<input type="file" id="avatarI" style="display:none" onchange="uploadAvatar()">

<script>
    const ADMIN_EMAILS = ["ivan.amogus737@gmail.com", "susivanov@gmail.com"];
    const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
    const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';
    const sb = window.supabase.createClient(SB_URL, SB_KEY);

    let currU = null, currP = null, isS = false;

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        currU = session?.user;
        if(currU) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
            const { data } = await sb.from('profiles').select('*').eq('id', currU.id).single();
            document.getElementById('navAvatar').src = data?.avatar_url || 'https://via.placeholder.com/150';
        }
        viewMainGallery();
    }

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    async function auth() {
        const e = document.getElementById('aE').value, p = document.getElementById('aP').value;
        const { data, error } = isS ? await sb.auth.signUp({email:e, password:p}) : await sb.auth.signInWithPassword({email:e, password:p});
        if(error) alert(error.message);
        else {
            if(isS) await sb.from('profiles').insert({id: data.user.id, username: e.split('@')[0]});
            location.reload();
        }
    }

    async function viewMainGallery() {
        document.getElementById('profile-section').innerHTML = "";
        const { data } = await sb.from('posts').select('*, profiles(username, avatar_url)').order('created_at', {ascending: false});
        renderGrid(data || []);
    }

    async function viewUserProfile(uid) {
        const { data: profile } = await sb.from('profiles').select('*').eq('id', uid).single();
        const { data: posts } = await sb.from('posts').select('*').eq('author_id', uid).order('created_at', {ascending: false});
        const isMy = currU && currU.id === uid;
        document.getElementById('profile-section').innerHTML = `
            <div class="profile-header">
                <div class="avatar-container" onclick="${isMy ? "document.getElementById('avatarI').click()" : ""}">
                    <img class="avatar" src="${profile?.avatar_url || 'https://via.placeholder.com/150'}">
                    ${isMy ? '<div class="avatar-overlay">+</div>' : ''}
                </div>
                <div>
                    <h2 style="margin:0">${profile?.username || 'User'}</h2>
                    ${isMy ? '<button class="btn" style="background:#262626; margin-top:10px;" onclick="logout()">Выйти</button>' : ''}
                </div>
            </div>
        `;
        renderGrid(posts || []);
    }

    function viewMyProfile() { if(currU) viewUserProfile(currU.id); }

    function renderGrid(posts) {
        const grid = document.getElementById('grid');
        grid.innerHTML = posts.map(p => {
            const isAdmin = currU && (ADMIN_EMAILS.includes(currU.email) || currU.id === p.author_id);
            const del = isAdmin ? `<button class="del-btn" onclick="event.stopPropagation(); delP('${p.id}')">Удалить</button>` : "";
            return `<div class="photo-card" onclick="viewP('${p.id}')">${del}<img src="${p.image_url}"></div>`;
        }).join('');
    }

    async function upload() {
        const file = document.getElementById('fileI').files[0];
        if(!file || !currU) return;
        document.getElementById('loader').style.display = 'block';
        const name = `${Date.now()}_${file.name}`;
        await sb.storage.from('photos').upload(name, file);
        const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(name);
        await sb.from('posts').insert({ image_url: publicUrl, author_id: currU.id });
        location.reload();
    }

    async function uploadAvatar() {
        const file = document.getElementById('avatarI').files[0];
        if(!file || !currU) return;
        const name = `avatars/${currU.id}`;
        await sb.storage.from('photos').upload(name, file, {upsert: true});
        const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(name);
        await sb.from('profiles').update({ avatar_url: publicUrl }).eq('id', currU.id);
        location.reload();
    }

    async function delP(id) {
        if(confirm("Удалить?")) { await sb.from('posts').delete().eq('id', id); location.reload(); }
    }

    async function viewP(id) {
        const { data } = await sb.from('posts').select('*, profiles(*)').eq('id', id).single();
        currP = data;
        document.getElementById('fImg').src = data.image_url;
        document.getElementById('lC').innerText = data.likes.length;
        document.getElementById('lH').innerText = data.likes.includes(currU?.id) ? "❤️" : "🤍";
        document.getElementById('postAuthorName').innerText = data.profiles?.username || 'User';
        document.getElementById('postAuthorAv').src = data.profiles?.avatar_url || 'https://via.placeholder.com/150';
        document.getElementById('cL').innerHTML = data.comments.map(c => `<div style="margin-bottom:5px;"><b>${c.user}:</b> ${c.text}</div>`).join('');
        openM('viewM');
    }

    async function doLike() {
        if(!currU) return openM('authM');
        let l = currP.likes.includes(currU.id) ? currP.likes.filter(i => i!==currU.id) : [...currP.likes, currU.id];
        await sb.from('posts').update({ likes: l }).eq('id', currP.id);
        viewP(currP.id);
    }

    async function doComm() {
        const t = document.getElementById('cI').value;
        if(!t || !currU) return;
        const { data: p } = await sb.from('profiles').select('username').eq('id', currU.id).single();
        const nc = [...currP.comments, { user: p.username, text: t }];
        await sb.from('posts').update({ comments: nc }).eq('id', currP.id);
        document.getElementById('cI').value = "";
        viewP(currP.id);
    }

    window.logout = async () => { await sb.auth.signOut(); location.reload(); };
    init();
</script>
</body>
</html>
