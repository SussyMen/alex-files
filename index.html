<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Файлы Алексея</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>Файлы Алексея</h1>
        <div class="admin-controls">
            <button id="adminBtn">Админ-панель</button>
            <span id="adminStatus" style="display:none;">🔓 Админ</span>
        </div>
    </header>

    <div id="passwordPanel" class="hidden">
        <input type="password" id="adminPass" placeholder="Пароль">
        <button id="loginBtn">Войти</button>
    </div>

    <main>
        <section class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <button id="uploadBtn">Загрузить в облако</button>
        </section>
        <div class="gallery" id="gallery"></div>
    </main>

    <div id="fullScreenModal" class="modal" onclick="closeFullScreen()">
        <img id="fullScreenImg" src="">
    </div>

    <script src="script.js"></script>
</body>
</html>
