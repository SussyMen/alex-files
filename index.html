<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexstagram</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="authModal" class="modal-overlay">
        <div class="auth-card">
            <h2 id="authTitle">Вход</h2>
            <input type="email" id="authEmail" placeholder="Email">
            <input type="password" id="authPass" placeholder="Пароль">
            <button class="btn-submit" onclick="window.handleAuth()">Продолжить</button>
            <span class="auth-switch" onclick="window.switchMode()" id="switchBtn">Нет аккаунта? Регистрация</span>
            <button class="btn-close" onclick="window.toggleAuth()">Отмена</button>
        </div>
    </div>

    <header>
        <div class="logo">Alex<span>stagram</span></div>
        <div class="nav-icons">
            <button class="btn-icon" id="addBtn" onclick="window.triggerUpload()" style="display:none;">➕</button>
            <button class="btn-auth" id="authBtn" onclick="window.toggleAuth()">Войти</button>
            <div id="userProfile" class="user-avatar" style="display:none;" onclick="window.handleLogout()">👤</div>
        </div>
    </header>

    <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="window.uploadPhoto()">

    <main><div class="gallery" id="gallery"></div></main>

    <script>
        window.toggleAuth = function() {
            const modal = document.getElementById('authModal');
            if (modal) {
                const isHidden = window.getComputedStyle(modal).display === 'none';
                modal.style.display = isHidden ? 'flex' : 'none';
            }
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
