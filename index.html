<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstagram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff; --text: #000; --border: #efefef; --accent: #0095f6; --danger: #ed4956; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; --border: #262626; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; max-width: 935px; margin: 0 auto; padding: 2px; }
        .photo-card { position: relative; aspect-ratio: 1/1; background: var(--border); cursor: pointer; overflow: hidden; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .view-content { background: var(--bg); width: 95%; max-width: 450px; border-radius: 15px; overflow: hidden; }
        .view-img { width: 100%; max-height: 60vh; object-fit: contain; background: #000; display: block; }
        .view-info { padding: 15px; }
        .comments-list { border-top: 1px solid var(--border); padding-top: 10px; max-height: 120px; overflow-y: auto; font-size: 14px; }
        .comm-input { display: flex; gap: 10px; margin-top: 10px; }
        .comm-input input { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); }
        .nav-btn { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(128,128,128,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .del-btn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo" style="font-weight: 900;">Alexstagram</div>
    <div id="nav">
        <button id="loginBtn" onclick="openM('authM')" style="background:var(--text); color:var(--bg); border:none; padding:8px 16px; border-radius:8px; font-weight:bold;">Войти</button>
        <div id="userMenu" style="display:none; gap:15px; align-items:center;">
            <div id="loader" class="spinner"></div>
            <button class="nav-btn" id="plusB" onclick="document.getElementById('fileI').click()">➕</button>
            <button class="nav-btn" onclick="logout()">👤</button>
        </div>
    </div>
</header>

<div class="modal" id="viewM" onclick="if(event.target==this) closeM('viewM')">
    <div class="view-content">
        <img class="view-img" id="fImg">
        <div class="view-info">
            <div class="actions" style="margin-bottom:10px;">
                <span style="font-size:26px; cursor:pointer;" id="lH" onclick="doLike()">🤍</span>
                <span id="lC" style="font-weight:bold">0</span>
            </div>
            <div class="comments-list" id="cL"></div>
            <div class="comm-input">
                <input type="text" id="cI" placeholder="Напишите комментарий..." onkeydown="if(event.key==='Enter') doComm()">
                <button onclick="doComm()" style="border:none; background:none; color:var(--accent); font-weight:bold;">Ок</button>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="authM" onclick="if(event.target==this) closeM('authM')">
    <div style="background:var(--bg); padding:30px; border-radius:20px; width:280px; text-align:center;">
        <h2 id="aT" style="margin-top:0">Вход</h2>
        <input type="email" id="aE" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="aP" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px;" onkeydown="if(event.key==='Enter') auth()">
        <button onclick="auth()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold;">Продолжить</button>
        <button onclick="toggleS()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Сменить режим</button>
    </div>
</div>

<input type="file" id="fileI" style="display:none" onchange="upload()">
<main><div class="gallery" id="grid"></div></main>

<script>
    // --- НАСТРОЙКИ ---
    const ADMIN_EMAILS = ['ivan.amogus737@gmail.com', 'susivanov@gmail.com']; // Впиши свои email-ы
    const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
    const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';

    // Используем уникальное имя для клиента
    const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

    let currU = null, currP = null, isS = false;

    // Ждем загрузки страницы
    document.addEventListener('DOMContentLoaded', () => {
        initApp();
    });

    async function initApp() {
        const { data: { session } } = await sbClient.auth.getSession();
        currU = session?.user;
        if(currU) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
        }
        loadP();
    }

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';
    window.toggleS = () => { isS = !isS; document.getElementById('aT').innerText = isS ? 'Регистрация' : 'Вход'; };

    window.auth = async () => {
        const e = document.getElementById('aE').value, p = document.getElementById('aP').value;
        if(!e || !p) return;
        const { error } = isS ? await sbClient.auth.signUp({email:e, password:p}) : await sbClient.auth.signInWithPassword({email:e, password:p});
        if(error) alert(error.message); else location.reload();
    };

    window.logout = async () => { if(confirm("Выйти?")) { await sbClient.auth.signOut(); location.reload(); } };

    async function loadP() {
        const { data, error } = await sbClient.from('posts').select('*').order('created_at', {ascending: false});
        if(error) return;
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        data?.forEach(p => {
            const isAdmin = currU && ADMIN_EMAILS.includes(currU.email);
            const del = isAdmin ? `<button class="del-btn" onclick="event.stopPropagation(); delP('${p.id}')">Удалить</button>` : "";
            grid.innerHTML += `<div class="photo-card" onclick="viewP('${p.id}')">${del}<img src="${p.image_url}"></div>`;
        });
    }

    window.upload = async () => {
        const file = document.getElementById('fileI').files[0];
        if(!file || !currU) return;
        document.getElementById('plusB').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        const name = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
        await sbClient.storage.from('photos').upload(name, file);
        const { data: { publicUrl } } = sbClient.storage.from('photos').getPublicUrl(name);
        await sbClient.from('posts').insert({ image_url: publicUrl });
        location.reload();
    };

    window.viewP = async (id) => {
        const { data } = await sbClient.from('posts').select('*').eq('id', id).single();
        currP = data;
        document.getElementById('fImg').src = data.image_url;
        document.getElementById('lC').innerText = data.likes.length;
        document.getElementById('lH').innerText = data.likes.includes(currU?.id) ? "❤️" : "🤍";
        document.getElementById('cL').innerHTML = data.comments.map(c => `<div><b>${c.user}:</b> ${c.text}</div>`).join('');
        openM('viewM');
    };

    window.doLike = async () => {
        if(!currU) return alert("Войдите!");
        let l = currP.likes.includes(currU.id) ? currP.likes.filter(i => i!==currU.id) : [...currP.likes, currU.id];
        await sbClient.from('posts').update({ likes: l }).eq('id', currP.id);
        viewP(currP.id);
    };

    window.doComm = async () => {
        const t = document.getElementById('cI').value;
        if(!t || !currU) return;
        const nc = [...currP.comments, { user: currU.email.split('@')[0], text: t }];
        await sbClient.from('posts').update({ comments: nc }).eq('id', currP.id);
        document.getElementById('cI').value = "";
        viewP(currP.id);
    };

    window.delP = async (id) => {
        if(confirm("Удалить?")) { await sbClient.from('posts').delete().eq('id', id); loadP(); closeM('viewM'); }
    };
</script>
</body>
</html>
