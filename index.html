<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alexstagram</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff; --text: #000; --border: #dbdbdb; --accent: #0095f6; }
        @media (prefers-color-scheme: dark) { :root { --bg: #000; --text: #fff; --border: #262626; } }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 22px; font-weight: bold; }
        .btn-main { background: var(--text); color: var(--bg); border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; max-width: 935px; margin: 0 auto; }
        .photo-card { position: relative; aspect-ratio: 1/1; background: var(--border); }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: #ed4956; color: white; border: none; border-radius: 4px; padding: 4px 7px; font-size: 11px; cursor: pointer; z-index: 10; }
        #authModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg); padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-blue { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Alexstagram</div>
    <div id="nav">
        <button class="btn-main" id="loginBtn" onclick="openAuth()">Войти</button>
        <div id="userMenu" style="display:none; gap:15px; align-items:center;">
            <button onclick="triggerFile()" style="background:none; border:none; font-size:24px; color:var(--text); cursor:pointer;">➕</button>
            <div onclick="logout()" style="cursor:pointer; font-size:22px;">👤</div>
        </div>
    </div>
</header>

<div id="authModal">
    <div class="auth-card">
        <h2 id="authTitle">Вход</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn-blue" onclick="handleAuth()">Продолжить</button>
        <button onclick="toggleMode()" id="switchBtn" style="background:none; border:none; color:var(--accent); margin-top:15px; cursor:pointer;">Нет аккаунта? Регистрация</button>
        <br>
        <button onclick="closeAuth()" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">Отмена</button>
    </div>
</div>

<input type="file" id="fileInp" style="display:none" onchange="upload()">
<main><div class="gallery" id="grid"></div></main>

<script>
    // --- НАСТРОЙКИ ---
    const ADMIN_EMAIL = 'ivan.amogus737@gmail.com'; // Впиши свою почту здесь!
    const SB_URL = 'https://kjbejfgeviuddxtrejjk.supabase.co';
    const SB_KEY = 'sb_publishable_p9gBa9ptV5wgko8BwWbV_w_diNV5Jv7';

    // Создаем клиента под коротким именем sb во избежание конфликтов
    const sb = window.supabase.createClient(SB_URL, SB_KEY);
    let isSignUp = false;

    // --- ФУНКЦИИ ---
    window.openAuth = () => document.getElementById('authModal').style.display = 'flex';
    window.closeAuth = () => document.getElementById('authModal').style.display = 'none';

    window.toggleMode = () => {
        isSignUp = !isSignUp;
        document.getElementById('authTitle').innerText = isSignUp ? "Регистрация" : "Вход";
        document.getElementById('switchBtn').innerText = isSignUp ? "Есть аккаунт? Войти" : "Нет аккаунта? Регистрация";
    };

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) return alert("Заполни поля");

        const { data, error } = isSignUp
            ? await sb.auth.signUp({ email, password: pass })
            : await sb.auth.signInWithPassword({ email, password: pass });

        if(error) alert(error.message);
        else {
            alert(isSignUp ? "Регистрация ок! Можно входить." : "Вход выполнен!");
            if(!isSignUp) location.reload(); else toggleMode();
        }
    };

    window.logout = async () => { if(confirm("Выйти?")) { await sb.auth.signOut(); location.reload(); } };

    async function loadPhotos() {
        const { data: s } = await sb.auth.getSession();
        const user = s?.session?.user;

        const { data, error } = await sb.storage.from('photos').list('', { sortBy: { column: 'name', order: 'desc' } });
        if(error) return;

        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        data.forEach(file => {
            const { data: { publicUrl } } = sb.storage.from('photos').getPublicUrl(file.name);
            const delBtn = (user && user.email === ADMIN_EMAIL) ? `<button class="del-btn" onclick="deletePhoto('${file.name}')">Удалить</button>` : "";
            grid.innerHTML += `<div class="photo-card">${delBtn}<img src="${publicUrl}"></div>`;
        });
    }

    window.triggerFile = () => document.getElementById('fileInp').click();

    window.upload = async () => {
        const file = document.getElementById('fileInp').files[0];
        if(!file) return;
        const cleanName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
        const { error } = await sb.storage.from('photos').upload(cleanName, file);
        if(error) alert(error.message); else loadPhotos();
    };

    window.deletePhoto = async (name) => {
        if(confirm("Удалить фото?")) {
            await sb.storage.from('photos').remove([name]);
            loadPhotos();
        }
    };

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if(session) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userMenu').style.display = 'flex';
        }
        loadPhotos();
    }
    init();
</script>
</body>
</html>
